<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена — Всемирные Новости</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 2rem;
        }
        .error-code { font-size: 8rem; font-weight: 900; color: #3b82f6; line-height: 1; }
        .error-text { font-size: 1.5rem; margin: 1rem 0; }
        .btn { 
            display: inline-block;
            padding: 0.8rem 2rem;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        .btn:hover { background: #1d4ed8; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div>
        <div class="error-code">404</div>
        <div class="error-text">Страница не найдена</div>
        <p>Возможно, новость была удалена или перемещена.</p>
        <a href="/" class="btn">← На главную</a>
    </div>
</body>
</html>
