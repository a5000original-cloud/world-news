<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новость - Всемирные Новости</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f4ff; color: #0f172a; line-height: 1.6; }
        .header { background: white; padding: 1rem 2rem; border-bottom: 1px solid #e2e8f0; }
        .header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; }
        .back-btn { background: #f1f5f9; border: none; padding: 0.6rem 1.2rem; border-radius: 50px; cursor: pointer; font-weight: 600; font-family: inherit; }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        .article-category { display: inline-block; background: #3b82f6; color: white; padding: 0.3rem 1rem; border-radius: 30px; font-size: 0.8rem; font-weight: 600; margin-bottom: 1rem; }
        .article-image { width: 100%; height: 400px; object-fit: cover; border-radius: 20px; margin-bottom: 2rem; background: #e2e8f0; }
        .article-title { font-size: 2rem; font-weight: 900; margin-bottom: 1rem; }
        .article-meta { color: #64748b; margin-bottom: 2rem; }
        .article-text { font-size: 1.1rem; line-height: 1.8; color: #334155; margin-bottom: 3rem; white-space: pre-wrap; }
        .comments-section { background: white; border-radius: 20px; padding: 2rem; }
        .comment { background: #f8fafc; padding: 1rem; border-radius: 12px; margin-bottom: 0.8rem; }
        .comment-author { font-weight: 600; margin-bottom: 0.3rem; }
        .loading { text-align: center; padding: 3rem; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <button class="back-btn" onclick="window.location.href='index.html'">← На главную</button>
            <span style="font-weight:700;">Всемирные Новости</span>
        </div>
    </header>
    <div class="container" id="content">
        <div class="loading">Загрузка новости...</div>
    </div>
    <script>
        const FIREBASE_URL = "https://world-news-portal-eb6b5-default-rtdb.firebaseio.com";
        const newsId = localStorage.getItem('currentNewsId');
        const demoComments = [
            { author: "Алексей Петров", text: "Очень интересная новость! Жду продолжения." },
            { author: "Мария Иванова", text: "Наконец-то! Технологии не стоят на месте." },
            { author: "Дмитрий Соколов", text: "Нужно больше доказательств, но звучит многообещающе." },
            { author: "Елена Козлова", text: "Это прорыв! Представляю, как изменится наша жизнь." }
        ];
        async function loadArticle() {
            var container = document.getElementById('content');
            if (!newsId) {
                container.innerHTML = '<div class="loading">Новость не найдена. <a href="index.html">На главную</a></div>';
                return;
            }
            try {
                var response = await fetch(FIREBASE_URL + '/news/' + newsId + '.json');
                var article = await response.json();
                if (!article) {
                    container.innerHTML = '<div class="loading">Новость не найдена. <a href="index.html">На главную</a></div>';
                    return;
                }
                var commentsHTML = '';
                for (var i = 0; i < demoComments.length; i++) {
                    commentsHTML += '<div class="comment"><div class="comment-author">' + demoComments[i].author + '</div><div class="comment-text">' + demoComments[i].text + '</div></div>';
                }
                container.innerHTML = '<span class="article-category">' + (article.category || 'Новость') + '</span>' +
                    '<h1 class="article-title">' + article.title + '</h1>' +
                    '<div class="article-meta">' + (article.date || '') + ' | ' + (article.views || 0) + ' просмотров</div>' +
                    '<img class="article-image" src="' + (article.image || 'https://images.unsplash.com/photo-1504711434969-e33886168d6c?w=1200') + '" alt="' + article.title + '" onerror="this.src=\'https://images.unsplash.com/photo-1504711434969-e33886168d6c?w=1200\'">' +
                    '<div class="article-text">' + (article.fullText || article.desc || '') + '</div>' +
                    '<div class="comments-section"><h2>Комментарии</h2>' + commentsHTML + '</div>';
            } catch (e) {
                container.innerHTML = '<div class="loading">Ошибка загрузки. <a href="index.html">На главную</a></div>';
            }
        }
        loadArticle();
    </script>
</body>
</html>
