<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Всемирные Новости 2026 — Свежие новости онлайн</title>
    <meta name="description" content="Актуальные мировые новости 2026 года. Технологии, наука, политика, спорт. Читайте и обсуждайте свежие новости онлайн.">
    <meta name="keywords" content="новости, мировые новости, технологии, наука, политика, спорт">
    <meta name="robots" content="index, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --accent: #8b5cf6;
            --bg: #f0f4ff;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --border: #e2e8f0;
            --radius: 20px;
            --shadow: 0 10px 30px -10px rgba(0,0,0,0.08);
            --shadow-lg: 0 25px 50px -12px rgba(0,0,0,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Шапка */
        .header {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #1e293b, #475569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 50px;
            padding: 0.5rem 1rem;
            gap: 0.5rem;
            min-width: 250px;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 0.9rem;
            width: 100%;
            font-family: inherit;
        }

        .search-box i {
            color: var(--text-light);
        }

        .nav-actions {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: white;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Категории */
        .categories {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .category-pill {
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            background: white;
            color: var(--text-light);
            transition: all 0.3s;
            font-family: inherit;
        }

        .category-pill.active {
            background: var(--primary);
            color: white;
        }

        /* Сетка новостей */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .news-card {
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            cursor: pointer;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .card-image {
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .card-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-date {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        .card-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 1rem;
        }

        .card-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--text-light);
        }

        .spinner {
            border: 3px solid #e2e8f0;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .news-grid { grid-template-columns: 1fr; }
            .header-inner { flex-direction: column; }
            .search-box { min-width: 100%; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <div class="logo" onclick="location.href='/'">
                <div class="logo-icon"><i class="fas fa-globe-americas"></i></div>
                <span class="logo-text">Всемирные Новости</span>
            </div>
            
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск новостей..." oninput="filterNews()">
            </div>
            
            <div class="nav-actions">
                <a href="admin.html" class="btn btn-outline">
                    <i class="fas fa-lock"></i> Админ
                </a>
                <button class="btn btn-primary" onclick="scrollToNews()">
                    <i class="fas fa-newspaper"></i> Свежие
                </button>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="categories" id="categoriesContainer">
            <button class="category-pill active" onclick="filterByCategory('all')">Все</button>
            <button class="category-pill" onclick="filterByCategory('Технологии')">Технологии</button>
            <button class="category-pill" onclick="filterByCategory('Наука')">Наука</button>
            <button class="category-pill" onclick="filterByCategory('Политика')">Политика</button>
            <button class="category-pill" onclick="filterByCategory('Экономика')">Экономика</button>
            <button class="category-pill" onclick="filterByCategory('Спорт')">Спорт</button>
            <button class="category-pill" onclick="filterByCategory('Здравоохранение')">Здоровье</button>
        </div>

        <div id="newsGrid" class="news-grid">
            <div class="loading">
                <div class="spinner"></div>
                Загрузка новостей...
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, getDocs, limit } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9zvO-k6IOH6Bd1Y9U85EK7lUGY17w7Os",
            authDomain: "world-news-portal-eb6b5.firebaseapp.com",
            projectId: "world-news-portal-eb6b5",
            storageBucket: "world-news-portal-eb6b5.firebasestorage.app",
            messagingSenderId: "945684746608",
            appId: "1:945684746608:web:415bb999554defc3c13fb5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allNews = [];
        let currentCategory = 'all';

        async function loadNews() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = '<div class="loading"><div class="spinner"></div>Загрузка новостей...</div>';

            try {
                const q = query(
                    collection(db, "news"),
                    where("status", "==", "approved"),
                    orderBy("date", "desc"),
                    limit(50)
                );
                const snapshot = await getDocs(q);
                allNews = [];
                snapshot.forEach(doc => {
                    allNews.push({ id: doc.id, ...doc.data() });
                });

                if (allNews.length === 0) {
                    // Если новостей нет, показываем демо-новости
                    loadDemoNews();
                    return;
                }

                displayNews(allNews);
            } catch (error) {
                console.error("Ошибка загрузки:", error);
                loadDemoNews();
            }
        }

        function loadDemoNews() {
            allNews = [
                {
                    id: "demo1",
                    title: "Прорыв в квантовых вычислениях: новый процессор превзошёл классические суперкомпьютеры",
                    category: "Технологии",
                    date: "20 июля 2026",
                    desc: "Учёные из ЦЕРН и Google Quantum AI объявили о создании квантового чипа, решающего задачи за секунды.",
                    image: "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=800&h=400&fit=crop",
                    comments: 24,
                    views: 15420
                },
                {
                    id: "demo2",
                    title: "Марсианская миссия ExoMars-28 обнаружила следы органических молекул",
                    category: "Наука",
                    date: "19 июля 2026",
                    desc: "Ровер Европейского космического агентства передал данные о наличии сложных органических соединений.",
                    image: "https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?w=800&h=400&fit=crop",
                    comments: 18,
                    views: 12300
                },
                {
                    id: "demo3",
                    title: "Саммит G20 в Дели: историческое соглашение о климатическом финансировании",
                    category: "Политика",
                    date: "18 июля 2026",
                    desc: "Лидеры двадцати крупнейших экономик договорились выделить $4 трлн на борьбу с изменением климата.",
                    image: "https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?w=800&h=400&fit=crop",
                    comments: 35,
                    views: 22100
                },
                {
                    id: "demo4",
                    title: "Apple представила Vision Pro 2 с нейроинтерфейсом прямого управления",
                    category: "Технологии",
                    date: "18 июля 2026",
                    desc: "Новое устройство смешанной реальности считывает мозговые импульсы для навигации без контроллеров.",
                    image: "https://images.unsplash.com/photo-1622979135225-d2ba269cf1ac?w=800&h=400&fit=crop",
                    comments: 42,
                    views: 35600
                },
                {
                    id: "demo5",
                    title: "ВОЗ одобрила первую универсальную вакцину против гриппа с эффективностью 97%",
                    category: "Здравоохранение",
                    date: "17 июля 2026",
                    desc: "Препарат обеспечивает длительный иммунитет против всех известных штаммов вируса гриппа.",
                    image: "https://images.unsplash.com/photo-1584483766114-2cea6facdf57?w=800&h=400&fit=crop",
                    comments: 29,
                    views: 18900
                },
                {
                    id: "demo6",
                    title: "Чемпионат мира по футболу 2026: финал США — Аргентина стал рекордным",
                    category: "Спорт",
                    date: "17 июля 2026",
                    desc: "Матч на стадионе MetLife собрал аудиторию более 2.5 миллиардов зрителей по всему миру.",
                    image: "https://images.unsplash.com/photo-1579952363873-27f3bade9f55?w=800&h=400&fit=crop",
                    comments: 56,
                    views: 45200
                }
            ];
            displayNews(allNews);
        }

        function displayNews(newsArray) {
            const grid = document.getElementById('newsGrid');
            if (newsArray.length === 0) {
                grid.innerHTML = '<div class="loading">Новости не найдены. Попробуйте изменить фильтр.</div>';
                return;
            }

            grid.innerHTML = newsArray.map(news => `
                <div class="news-card" onclick="window.location.href='news.html?id=${news.id}'" data-aos="fade-up">
                    <div class="card-image" style="background-image: url('${news.image || 'https://images.unsplash.com/photo-1504711434969-e33886168d6c?w=800'}')">
                        <span class="card-badge">${news.category}</span>
                    </div>
                    <div class="card-content">
                        <div class="card-date"><i class="far fa-calendar"></i> ${news.date}</div>
                        <h3 class="card-title">${news.title}</h3>
                        <p class="card-desc">${news.desc || ''}</p>
                        <div class="card-stats">
                            <span><i class="far fa-eye"></i> ${news.views || 0}</span>
                            <span><i class="far fa-comment"></i> ${news.comments || 0}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.filterByCategory = function(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            const filtered = cat === 'all' ? allNews : allNews.filter(n => n.category === cat);
            displayNews(filtered);
        };

        window.filterNews = function() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allNews;
            if (currentCategory !== 'all') {
                filtered = filtered.filter(n => n.category === currentCategory);
            }
            if (query) {
                filtered = filtered.filter(n => 
                    n.title.toLowerCase().includes(query) || 
                    (n.desc && n.desc.toLowerCase().includes(query))
                );
            }
            displayNews(filtered);
        };

        window.scrollToNews = function() {
            document.getElementById('newsGrid').scrollIntoView({ behavior: 'smooth' });
        };

        // Загрузка при старте
        loadNews();
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 600, once: true });</script>
</body>
</html>
