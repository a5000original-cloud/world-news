<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Всемирные Новости 2026 — Свежие новости онлайн</title>
    <meta name="description" content="Актуальные мировые новости. Технологии, наука, политика, спорт. Читайте и обсуждайте!">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #f0f4ff;
            --text: #0f172a;
            --text-light: #64748b;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 900;
            color: #1e293b;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 50px;
            padding: 0.5rem 1rem;
            gap: 0.5rem;
            min-width: 250px;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 0.9rem;
            width: 100%;
            font-family: inherit;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-outline {
            background: white;
            color: var(--text);
            border: 1px solid #e2e8f0;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .categories {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .category-pill {
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            background: white;
            color: var(--text-light);
            transition: all 0.3s;
            font-family: inherit;
        }

        .category-pill.active {
            background: var(--primary);
            color: white;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .news-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.08);
            transition: all 0.3s;
            cursor: pointer;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
        }

        .card-image {
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .card-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-date {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        .card-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 1rem;
        }

        .card-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
            grid-column: 1 / -1;
        }

        .spinner {
            border: 3px solid #e2e8f0;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
            border-top: 1px solid #e2e8f0;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .news-grid { grid-template-columns: 1fr; }
            .header-inner { flex-direction: column; }
            .search-box { min-width: 100%; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <div class="logo" onclick="location.reload()">
                <div class="logo-icon"><i class="fas fa-globe-americas"></i></div>
                <span class="logo-text">Всемирные Новости</span>
            </div>
            
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск новостей..." oninput="filterNews()">
            </div>
            
            <div>
                <a href="admin.html" class="btn btn-outline">
                    <i class="fas fa-lock"></i> Админ
                </a>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="categories" id="categoriesContainer">
            <button class="category-pill active" onclick="filterByCategory('all', this)">Все</button>
            <button class="category-pill" onclick="filterByCategory('Технологии', this)">Технологии</button>
            <button class="category-pill" onclick="filterByCategory('Наука', this)">Наука</button>
            <button class="category-pill" onclick="filterByCategory('Политика', this)">Политика</button>
            <button class="category-pill" onclick="filterByCategory('Экономика', this)">Экономика</button>
            <button class="category-pill" onclick="filterByCategory('Спорт', this)">Спорт</button>
            <button class="category-pill" onclick="filterByCategory('Здравоохранение', this)">Здоровье</button>
        </div>

        <div id="newsGrid" class="news-grid">
            <div class="loading">
                <div class="spinner"></div>
                Загрузка новостей...
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 Всемирные Новости. Все права защищены.</p>
    </footer>

    <script>
        const FIREBASE_URL = "https://world-news-portal-eb6b5-default-rtdb.firebaseio.com";
        let allNews = [];
        let currentCategory = 'all';

        async function loadNews() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = '<div class="loading"><div class="spinner"></div>Загрузка новостей...</div>';

            try {
                const response = await fetch(`${FIREBASE_URL}/news.json`);
                const data = await response.json();
                
                allNews = [];
                if (data) {
                    Object.keys(data).forEach(key => {
                        const news = data[key];
                        if (news.status === 'approved') {
                            allNews.push({ id: key, ...news });
                        }
                    });
                }
                
                // Сортируем по дате создания (новые сверху)
                allNews.sort((a, b) => {
                    if (a.createdAt && b.createdAt) return b.createdAt.localeCompare(a.createdAt);
                    return 0;
                });

                if (allNews.length === 0) {
                    grid.innerHTML = '<div class="loading" style="grid-column:1/-1;">Новостей пока нет. <a href="admin.html">Добавьте первую новость через админ-панель!</a></div>';
                    return;
                }

                displayNews(allNews);
            } catch (e) {
                console.error('Ошибка загрузки:', e);
                grid.innerHTML = '<div class="loading" style="grid-column:1/-1;">Ошибка загрузки новостей. Проверьте подключение к интернету.</div>';
            }
        }

        function displayNews(newsArray) {
            const grid = document.getElementById('newsGrid');
            
            grid.innerHTML = newsArray.map(news => `
                <div class="news-card" onclick="openNews('${news.id}')">
                    <div class="card-image" style="background-image: url('${news.image || 'https://images.unsplash.com/photo-1504711434969-e33886168d6c?w=800'}')">
                        <span class="card-badge">${news.category || 'Новость'}</span>
                    </div>
                    <div class="card-content">
                        <div class="card-date"><i class="far fa-calendar"></i> ${news.date || ''}</div>
                        <h3 class="card-title">${news.title}</h3>
                        <p class="card-desc">${news.desc || ''}</p>
                        <div class="card-stats">
                            <span><i class="far fa-eye"></i> ${news.views || 0}</span>
                            <span><i class="far fa-comment"></i> ${news.comments || 0}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openNews(id) {
            // Сохраняем ID новости и переходим на страницу новости
            localStorage.setItem('currentNewsId', id);
            window.location.href = 'news.html';
        }

        function filterByCategory(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
            if (btn) btn.classList.add('active');
            
            const filtered = cat === 'all' ? allNews : allNews.filter(n => n.category === cat);
            displayNews(filtered.length > 0 ? filtered : allNews);
        }

        function filterNews() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allNews;
            if (currentCategory !== 'all') {
                filtered = filtered.filter(n => n.category === currentCategory);
            }
            if (query) {
                filtered = filtered.filter(n => 
                    n.title.toLowerCase().includes(query) || 
                    (n.desc && n.desc.toLowerCase().includes(query))
                );
            }
            displayNews(filtered.length > 0 ? filtered : []);
        }

        loadNews();
    </script>
</body>
</html>
