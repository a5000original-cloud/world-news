<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новость — Всемирные Новости</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #f0f4ff;
            --text: #0f172a;
            --text-light: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            background: #f1f5f9;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #e2e8f0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .article-category {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .article-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 2rem;
            background: #e2e8f0;
        }

        .article-title {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .article-meta {
            display: flex;
            gap: 2rem;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .article-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #334155;
            margin-bottom: 3rem;
            white-space: pre-wrap;
        }

        .comments-section {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.08);
        }

        .comments-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .comment-form {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .comment-input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            resize: none;
            min-height: 50px;
        }

        .comment-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .comment {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 0.8rem;
        }

        .comment-author {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }

        .comment-text {
            font-size: 0.95rem;
            color: #334155;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <button class="back-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i> На главную
            </button>
            <span style="font-weight:700;">Всемирные Новости</span>
        </div>
    </header>

    <div class="container" id="articleContainer">
        <div class="loading">Загрузка новости...</div>
    </div>

    <script>
        const FIREBASE_URL = "https://world-news-portal-eb6b5-default-rtdb.firebaseio.com";
        const newsId = localStorage.getItem('currentNewsId');

        const demoComments = [
            { author: "Алексей Петров", text: "Очень интересная новость! Жду продолжения." },
            { author: "Мария Иванова", text: "Наконец-то! Технологии не стоят на месте." },
            { author: "Дмитрий Соколов", text: "Нужно больше доказательств, но звучит многообещающе." },
            { author: "Елена Козлова", text: "Это прорыв! Представляю, как изменится наша жизнь." }
        ];

        async function loadArticle() {
            const container = document.getElementById('articleContainer');
            
            if (!newsId) {
                container.innerHTML = '<div class="loading">Новость не найдена. <a href="index.html">На главную</a></div>';
                return;
            }

            try {
                const response = await fetch(`${FIREBASE_URL}/news/${newsId}.json`);
                const article = await response.json();
                
                if (!article) {
                    container.innerHTML = '<div class="loading">Новость не найдена. <a href="index.html">На главную</a></div>';
                    return;
                }

                container.innerHTML = `
                    <span class="article-category">${article.category || 'Новость'}</span>
                    <h1 class="article-title">${article.title}</h1>
                    <div class="article-meta">
                        <span><i class="far fa-calendar"></i> ${article.date || ''}</span>
                        <span><i class="far fa-eye"></i> ${(article.views || 0)} просмотров</span>
                    </div>
                    <img class="article-image" src="${article.image || 'https://images.unsplash.com/photo-1504711434969-e33886168d6c?w=1200'}" alt="${article.title}" onerror="this.src='https://images.unsplash.com/photo-1504711434969-e33886168d6c?w=1200'">
                    <div class="article-text">${article.fullText || article.desc || ''}</div>
                    
                    <div class="comments-section">
                        <h2 class="comments-title"><i class="far fa-comments"></i> Комментарии (${demoComments.length})</h2>
                        <div class="comment-form">
                            <textarea class="comment-input" id="commentInput" placeholder="Напишите ваш комментарий..."></textarea>
                            <button class="comment-submit" onclick="addComment()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                        <div id="commentsList">
                            ${demoComments.map(c => `
                                <div class="comment">
                                    <div class="comment-author">${c.author}</div>
                                    <div class="comment-text">${c.text}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } catch (e) {
                container.innerHTML = '<div class="loading">Ошибка загрузки. <a href="index.html">На главную</a></div>';
            }
        }

        function addComment() {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            if (!text) return;
            
            const list = document.getElementById('commentsList');
            list.insertAdjacentHTML('afterbegin', `
                <div class="comment" style="border-left: 3px solid var(--primary);">
                    <div class="comment-author">Вы</div>
                    <div class="comment-text">${text}</div>
                </div>
            `);
            input.value = '';
        }

        loadArticle();
    </script>
</body>
</html>
